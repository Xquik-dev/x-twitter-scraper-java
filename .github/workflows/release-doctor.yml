name: Release Doctor

on:
  workflow_dispatch:
    inputs:
      release_ref:
        description: Optional public release tag to verify
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-doctor-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-doctor:
    name: Release Doctor
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "26"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-cleanup: always

      - name: Check release environment
        run: bash ./bin/check-release-environment
        env:
          SONATYPE_USERNAME: ${{ secrets.X_TWITTER_SCRAPER_SONATYPE_USERNAME || secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.X_TWITTER_SCRAPER_SONATYPE_PASSWORD || secrets.SONATYPE_PASSWORD }}
          GPG_SIGNING_KEY: ${{ secrets.X_TWITTER_SCRAPER_SONATYPE_GPG_SIGNING_KEY || secrets.GPG_SIGNING_KEY }}
          GPG_SIGNING_PASSWORD: ${{ secrets.X_TWITTER_SCRAPER_SONATYPE_GPG_SIGNING_PASSWORD || secrets.GPG_SIGNING_PASSWORD }}

      - name: Build local Maven artifacts
        run: ./gradlew publishToMavenLocal -PpublishLocal --no-configuration-cache --no-daemon --stacktrace

      - name: Verify public release signature
        if: inputs.release_ref != ''
        env:
          RELEASE_REF: ${{ inputs.release_ref }}
        run: ./bin/verify-release-signature "$RELEASE_REF"
