name: Publish Maven Central

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: publish-maven-central-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: maven-central
    steps:
      - name: Check out release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "26"

      - name: Set up Gradle without shared caches
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-disabled: true

      - name: Validate release credentials
        run: bash ./bin/check-release-environment
        env:
          SONATYPE_USERNAME: ${{ secrets.X_TWITTER_SCRAPER_SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.X_TWITTER_SCRAPER_SONATYPE_PASSWORD }}
          GPG_SIGNING_KEY: ${{ secrets.X_TWITTER_SCRAPER_SONATYPE_GPG_SIGNING_KEY }}
          GPG_SIGNING_PASSWORD: ${{ secrets.X_TWITTER_SCRAPER_SONATYPE_GPG_SIGNING_PASSWORD }}

      - name: Publish signed artifacts
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "$GPG_SIGNING_KEY" | gpg --batch --pinentry-mode loopback --passphrase-fd 3 --import 3<<< "$GPG_SIGNING_PASSWORD"
          GPG_SIGNING_KEY_ID="$(gpg --batch --with-colons --list-secret-keys | awk -F: '$1 == "fpr" { print "0x" substr($10, length($10) - 15); exit }')"
          export GPG_SIGNING_KEY_ID
          ./gradlew publishAndReleaseToMavenCentral \
            -PmavenCentralUsername="$SONATYPE_USERNAME" \
            -PmavenCentralPassword="$SONATYPE_PASSWORD" \
            --no-configuration-cache \
            --no-daemon \
            --stacktrace
        env:
          SONATYPE_USERNAME: ${{ secrets.X_TWITTER_SCRAPER_SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.X_TWITTER_SCRAPER_SONATYPE_PASSWORD }}
          GPG_SIGNING_KEY: ${{ secrets.X_TWITTER_SCRAPER_SONATYPE_GPG_SIGNING_KEY }}
          GPG_SIGNING_PASSWORD: ${{ secrets.X_TWITTER_SCRAPER_SONATYPE_GPG_SIGNING_PASSWORD }}
