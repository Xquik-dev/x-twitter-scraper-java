name: CI

on:
  push:
    branches:
      - "**"
      - "!integrated/**"
      - "!stl-preview-head/**"
      - "!stl-preview-base/**"
      - "!generated"
      - "!codegen/**"
      - "codegen/stl/**"
  pull_request:
    branches-ignore:
      - "stl-preview-head/**"
      - "stl-preview-base/**"

permissions:
  contents: read

concurrency:
  group: java-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Licensing
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "26"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-cleanup: always

      - name: Check Java & Kotlin
        run: ./scripts/lint

      - name: Check shell scripts
        run: >-
          shellcheck
          bin/check-release-environment
          bin/check-release-workflow
          scripts/audit
          scripts/build
          scripts/check-reproducible
          scripts/coverage
          scripts/fast-format
          scripts/format
          scripts/java-format
          scripts/kotlin-format
          scripts/lint
          scripts/test
          scripts/upload-artifacts

      - name: Check workflows
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: Check repository licensing
        uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5 # v6.0.0

  build:
    name: Build
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Java 25 for shrinkers
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: oracle
          java-version: "25"

      - name: Save shrinker Java home
        run: echo "SHRINKER_JAVA_HOME=$JAVA_HOME" >> "$GITHUB_ENV"

      - name: Set up Java 26
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "26"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-cleanup: always

      - name: Build SDK
        run: ./scripts/build

  test:
    name: Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Java 25 for shrinkers
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: oracle
          java-version: "25"

      - name: Save shrinker Java home
        run: echo "SHRINKER_JAVA_HOME=$JAVA_HOME" >> "$GITHUB_ENV"

      - name: Set up Java 26
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "26"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-cleanup: always

      - name: Run all tests without skips
        run: ./scripts/test

  coverage:
    name: Coverage
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "26"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-cleanup: always

      - name: Enforce maintained-source coverage
        run: ./scripts/coverage

      - name: Upload coverage evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: java-coverage
          path: |
            build/reports/jacoco/coverage/coverage.xml
            build/reports/jacoco/coverage-raw/coverage.xml
          retention-days: 14

  dynamic-analysis:
    name: Dynamic Analysis
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "26"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-cleanup: always

      - name: Fuzz untrusted retry headers
        env:
          JAZZER_FUZZ: "1"
        run: >-
          ./gradlew
          :x-twitter-scraper-java-core:test
          --tests '*RetryAfterFuzzTest'
          --no-build-cache
          --no-configuration-cache

  supply-chain:
    name: Dependency & Build Security
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "26"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-cleanup: always

      - name: Audit dependencies and licenses
        run: ./scripts/audit

      - name: Verify reproducible Maven artifacts
        run: ./scripts/check-reproducible

      - name: Upload dependency license evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: java-dependency-licenses
          path: build/reports/dependency-license
          retention-days: 14
